volumes:
  n8n_storage:
  postgres_storage:
  qdrant_storage:

networks:
  demo:

x-n8n: &service-n8n # image: n8nio/n8n:latest
  image : n8n
  networks: ["demo"]
  environment:
    - DB_TYPE=postgresdb
    - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}
    - DB_POSTGRESDB_HOST=postgres
    - DB_POSTGRESDB_USER=${POSTGRES_USER}
    - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}

    - N8N_HOST=${N8N_HOST}
    - N8N_PROTOCOL=${N8N_PROTOCOL}
    - N8N_COMMUNITY_PACKAGES_ALLOW_TOOL_USAGE=true
    - N8N_DIAGNOSTICS_ENABLED=false
    - N8N_PERSONALIZATION_ENABLED=false
    - N8N_EDITOR_BASE_URL=${N8N_EDITOR_BASE_URL}
    - N8N_DEFAULT_BINARY_DATA_MODE=${N8N_DEFAULT_BINARY_DATA_MODE}
    - WEBHOOK_URL=${WEBHOOK_URL}
    - N8N_BASIC_AUTH_ACTIVE=${N8N_BASIC_AUTH_ACTIVE}
    - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER}
    - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
    - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
    - N8N_USER_MANAGEMENT_JWT_SECRET=${N8N_USER_MANAGEMENT_JWT_SECRET}

    - OLLAMA_HOST=${OLLAMA_HOST:-http://ollama:11434}
  env_file:
    - path: .env
      required: true

x-ollama: &service-ollama
  image: ollama/ollama:latest
  container_name: ollama
  networks: ["demo"]
  restart: unless-stopped
  ports:
    - "127.0.0.1:11434:11434"
  # ports:
  #   - 11434:11434
  environment:
    - OLLAMA_HOST=0.0.0.0:11434
  volumes:
    - ./ollama_models:/root/.ollama
  healthcheck:
    # test: ["CMD", "curl", "-fsS", "http://localhost:11434/api/tags"]
    test:
      [
        "CMD-SHELL",
        "wget -q http://localhost:11434/api/tags -O /dev/null || exit 1",
      ]
    interval: 10s
    timeout: 5s
    retries: 20

x-init-ollama: &init-ollama
  image: ollama/ollama:latest
  networks: ["demo"]
  container_name: ollama-pull-all
  volumes:
    - ./ollama_models:/root/.ollama
  entrypoint: /bin/sh
  environment:
    - OLLAMA_HOST=ollama:11434
  command:
    - "-c"
    - "ollama pull llama3.2 & ollama pull gpt-oss:20b"

services:
  postgres:
    image: pgvector/pgvector:pg16
    hostname: postgres
    networks: ["demo"]
    restart: unless-stopped
    ports:
      - 5432:5432
    # ports:
    #   - 5432:5432
    environment:
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - POSTGRES_DB
    volumes:
      - postgres_storage:/var/lib/postgresql/data
      # The postgres image automatically runs any .sql files in this directory.
      - ./postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -h localhost -U ${POSTGRES_USER} -d ${POSTGRES_DB}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  # n8n-import:
  #   <<: *service-n8n
  #   hostname: n8n-import
  #   container_name: n8n-import
  #   entrypoint: /bin/sh
  #   command:
  #     - "-c"
  #     - "n8n import:credentials --separate --input=/demo-data/credentials && n8n import:workflow --separate --input=/demo-data/workflows"
  #   volumes:
  #     - ./n8n/demo-data:/demo-data
  #   depends_on:
  #     postgres:
  #       condition: service_healthy

  n8n:
    <<: *service-n8n
    hostname: n8n
    container_name: n8n
    restart: unless-stopped
    ports:
      - 5678:5678
    volumes:
      - n8n_storage:/home/node/.n8n
      - ./n8n/demo-data:/demo-data
      - ./shared:/data/shared
    depends_on:
      postgres:
        condition: service_healthy
      # ngrok:
      #   condition: service_started ##remove this prevent cycle dependencies
      # n8n-import:
      #   condition: service_completed_successfully
    healthcheck:
      # Use CMD-SHELL and wget for maximum compatibility
      test:
        ["CMD-SHELL", "wget -q http://localhost:5678/ -O /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  qdrant:
    image: qdrant/qdrant
    hostname: qdrant
    container_name: qdrant
    networks: ["demo"]
    restart: unless-stopped
    ports:
      - "127.0.0.1:6333:6333"
    # ports:
    #   - 6333:6333
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      # test: ["CMD", "curl", "-fsS", "http://localhost:6333/readyz"]
      test:
        [
          "CMD-SHELL",
          "wget -q http://localhost:6333/readyz -O /dev/null || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 20

  ollama-cpu:
    profiles: ["cpu"]
    <<: *service-ollama

  ollama-gpu:
    profiles: ["gpu-nvidia"]
    <<: *service-ollama
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    gpus: all
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility

  ollama-pull-all-cpu:
    profiles: ["cpu"]
    <<: *init-ollama # inherit from the init template
    container_name: ollama-pull-cpu
    command:
      - "-c"
      - "sleep 3; ollama pull llama3.2 && ollama pull gpt-oss:20b" # Pulls both sequentially
    depends_on:
      - ollama-cpu

  ollama-pull-all-gpu:
    profiles: ["gpu-nvidia"] # only runs if you start with --profile gpu-nvidia
    <<: *init-ollama
    container_name: ollama-pull-gpu
    command:
      - "-c"
      - "sleep 3; ollama pull llama3.2 && ollama pull gpt-oss:20b" # Pulls both sequentially
    depends_on:
      - ollama-gpu
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflare-tunnel
    restart: unless-stopped
    networks:
      - demo # <-- MUST be on the same 'demo' network
    command: tunnel --no-autoupdate run
    environment:
      # This token comes from your Cloudflare Zero Trust dashboard
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q http://localhost:2000/ready -O /dev/null || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
